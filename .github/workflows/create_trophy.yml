name: create_trophy
on:
  schedule:
     - cron: "0 3 * * *"
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the master branch
  push:
    branches:
    - main

jobs:
  create-trophy:
    runs-on: ubuntu-latest
    steps:

    - uses: actions/checkout@v4

    - name: Generate trophy
      id: generate-trophy
      uses: Erik-Donath/github-profile-trophy@feature/generate-svg
      with:
        username: ${{ github.repository_owner }}
        outputs: trophy.svg
        token: ${{ secrets.GITHUB_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Debug workspace
      run: |
        pwd
        find . -type f

    - name: Verify SVG generated
      run: |
        if [ -f trophy.svg ]; then
          echo "SVG exists ($(wc -c < trophy.svg) Bytes)"
          file trophy.svg
        else
          echo "SVG failed to generate"
          exit 1
        fi
        
    - name: Commit and push SVG
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
    
        git add trophy.svg
        git commit -m "Update trophy.svg" || echo "No changes to commit"
        git push
        
    - uses: actions/upload-artifact@v4
      with:
        name: trophy
        path: trophy.svg
